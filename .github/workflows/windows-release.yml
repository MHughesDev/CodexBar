name: Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  SWIFT_VERSION: '6.1'

jobs:
  build-engine:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Swift for Windows
        shell: pwsh
        run: |
          $installer = "swift-$env:SWIFT_VERSION-RELEASE-windows10-x86_64.exe"
          $url = "https://download.swift.org/swift-$env:SWIFT_VERSION-release/windows10/swift-$env:SWIFT_VERSION-RELEASE/swift-$env:SWIFT_VERSION-RELEASE-windows10-x86_64.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer
          Start-Process -FilePath ".\$installer" -ArgumentList "/S" -Wait -NoNewWindow
          $swiftBin = "C:\Program Files\Swift\Toolchains\$env:SWIFT_VERSION+Asserts\usr\bin"
          echo "$swiftBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Swift version
        shell: pwsh
        run: swift --version

      - name: Swift test
        shell: pwsh
        run: swift test --parallel

      - name: Build engine (release)
        shell: pwsh
        run: swift build -c release --product codexbar

      - name: Locate engine binary
        id: locate
        shell: pwsh
        run: |
          $binDir = (swift build -c release --product codexbar --show-bin-path).Trim()
          echo "bin_dir=$binDir" >> $env:GITHUB_OUTPUT

      - name: Collect Swift runtime DLLs
        id: runtime
        shell: pwsh
        run: |
          $binDir = "${{ steps.locate.outputs.bin_dir }}"
          $runtimeDir = "C:\Program Files\Swift\Toolchains\$env:SWIFT_VERSION+Asserts\usr\bin"
          $dllNames = @(
            'swiftCore.dll',
            'swiftCRT.dll',
            'Foundation.dll',
            'FoundationNetworking.dll',
            'FoundationXML.dll',
            'dispatch.dll',
            'BlocksRuntime.dll',
            'swiftDispatch.dll',
            'swiftWinSDK.dll'
          )
          $staging = Join-Path $env:RUNNER_TEMP 'engine-staging'
          New-Item -ItemType Directory -Path $staging -Force | Out-Null
          Copy-Item -Path (Join-Path $binDir 'codexbar.exe') -Destination $staging
          foreach ($dll in $dllNames) {
            $src = Join-Path $runtimeDir $dll
            if (Test-Path $src) {
              Copy-Item -Path $src -Destination $staging
            }
          }
          echo "staging=$staging" >> $env:GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: engine-win-x64
          path: ${{ steps.runtime.outputs.staging }}\

  build-shell:
    runs-on: windows-latest
    needs: build-engine
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: engine-win-x64
          path: artifacts/engine

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish shell (self-contained, x64)
        shell: pwsh
        run: |
          dotnet publish windows/CodexBar.Shell/CodexBar.Shell.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -o "$env:RUNNER_TEMP\shell-publish"

      - uses: actions/upload-artifact@v4
        with:
          name: shell-win-x64
          path: ${{ runner.temp }}\shell-publish\

  package:
    runs-on: windows-latest
    needs: build-shell
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: engine-win-x64
          path: artifacts/engine

      - uses: actions/download-artifact@v4
        with:
          name: shell-win-x64
          path: artifacts/shell

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          if (-not $tag -or $tag -eq '') {
            $tag = 'v0.0.0-dev'
          }
          $version = $tag.TrimStart('v')
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Assemble portable zip
        id: zip
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $stagingDir = Join-Path $env:RUNNER_TEMP "CodexBar-$version-win-x64"
          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null

          Copy-Item -Path 'artifacts\engine\*' -Destination $stagingDir -Recurse
          Copy-Item -Path 'artifacts\shell\*' -Destination $stagingDir -Recurse

          $zipName = "CodexBar-$version-win-x64.zip"
          $zipPath = Join-Path $env:RUNNER_TEMP $zipName
          Compress-Archive -Path "$stagingDir\*" -DestinationPath $zipPath

          $hash = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash.ToLower()
          "$hash  $zipName" | Out-File -FilePath "$zipPath.sha256" -Encoding utf8

          echo "zip_path=$zipPath" >> $env:GITHUB_OUTPUT
          echo "zip_name=$zipName" >> $env:GITHUB_OUTPUT

      - name: Upload release assets
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            ${{ steps.zip.outputs.zip_path }}
            ${{ steps.zip.outputs.zip_path }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: codexbar-win-x64-portable
          path: |
            ${{ steps.zip.outputs.zip_path }}
            ${{ steps.zip.outputs.zip_path }}.sha256
